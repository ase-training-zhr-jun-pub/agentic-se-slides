name: Cloudflare Pages Preview

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, closed]

concurrency:
  group: cloudflare-pages-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PREVIEW_BRANCH: pr-${{ github.event.pull_request.number }}
  COMMENT_MARKER: <!-- cloudflare-pages-preview -->

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub dependency auth
        env:
          GH_READ_TOKEN: ${{ secrets.SLIDEV_THEME_GITHUB_TOKEN || github.token }}
        run: |
          git config --global url."https://x-access-token:${GH_READ_TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://x-access-token:${GH_READ_TOKEN}@github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: npm ci

      - name: Build Slidev deck
        run: npm run build

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }} --branch=${{ env.PREVIEW_BRANCH }} --commit-hash=${{ github.event.pull_request.head.sha }} --commit-message="PR #${{ github.event.pull_request.number }} preview"
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment preview URL
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url || steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const marker = process.env.COMMENT_MARKER;
            const deploymentUrl = process.env.DEPLOYMENT_URL || 'Preview deployment finished, but Cloudflare did not report a deployment URL.';
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const body = `${marker}\nCloudflare Pages Preview: ${deploymentUrl}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wrangler
        run: npm install --global wrangler

      - name: Delete Cloudflare Pages preview deployments
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          set -euo pipefail

          deployments_json="$(wrangler pages deployment list --project-name="$PROJECT_NAME" --environment=preview --json)"
          deployment_ids="$(node -e '
            const parsed = JSON.parse(process.argv[1]);
            const deployments = Array.isArray(parsed) ? parsed : parsed.result || parsed.deployments || [];
            const branch = process.env.PREVIEW_BRANCH;
            const ids = deployments
              .filter((deployment) => deployment.deployment_trigger?.metadata?.branch === branch)
              .map((deployment) => deployment.id);
            process.stdout.write(ids.join("\n"));
          ' "$deployments_json")"

          if [ -z "$deployment_ids" ]; then
            echo "No Cloudflare Pages preview deployments found for $PREVIEW_BRANCH."
            exit 0
          fi

          while IFS= read -r deployment_id; do
            wrangler pages deployment delete "$deployment_id" --project-name="$PROJECT_NAME" --force
          done <<< "$deployment_ids"

      - name: Mark preview as removed
        uses: actions/github-script@v7
        with:
          script: |
            const marker = process.env.COMMENT_MARKER;
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const body = `${marker}\nCloudflare Pages Preview removed.`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
